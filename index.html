<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1 1'><rect width='1' height='1' fill='%23000'/></svg>">
  <title>ascii-goggles</title>
  <meta name="description" content="ascii all I see">
  <meta property="og:title" content="ascii-goggles">
  <meta property="og:description" content="ascii all I see">
  <meta property="og:image" content="https://res.cloudinary.com/dm9gwanrg/image/upload/v1772926379/ascii-goggles-edited_c7hcwy.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="675">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="ascii-goggles">
  <meta name="twitter:description" content="ascii all I see">
  <meta name="twitter:image" content="https://res.cloudinary.com/dm9gwanrg/image/upload/v1772926379/ascii-goggles-edited_c7hcwy.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="ascii-container">
  <canvas id="ascii-canvas"></canvas>
<div id="fps-counter"></div>
  <button id="screenshot-btn" aria-label="Take screenshot"></button>
  <div id="lock-track">
    <div id="lock-track-line"></div>
    <div id="lock-thumb"></div>
    <div id="lock-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
    </div>
  </div>
  <button id="rotate-btn" aria-label="Rotate camera"><svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><path d="M20 11a8.1 8.1 0 0 0 -15.5 -2m-.5 -4v4h4"></path><path d="M4 13a8.1 8.1 0 0 0 15.5 2m.5 4v-4h-4"></path></svg></button>
</div>

<div id="camera-prompt">
  <p id="camera-prompt-text">accept camera perms for ascii</p>
  <div class="arrows">↓ ↓ ↓</div>
  <button id="retry-btn" style="display:none;">try again</button>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="sample-canvas"></canvas>

<script>
const charset = ' .\'`^",:;Il!i><~+_-?][}{1)(|\\/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$';

const video = document.getElementById('video');
const sampleCanvas = document.getElementById('sample-canvas');
const sampleCtx = sampleCanvas.getContext('2d', { willReadFrequently: true });
const asciiCanvas = document.getElementById('ascii-canvas');
const outCtx = asciiCanvas.getContext('2d');
const fpsCounter = document.getElementById('fps-counter');

const isMobile = window.matchMedia('(max-width: 768px), (hover: none)').matches;
let cols = isMobile ? 60 : 80;
let mirror = true;
let running = false;
let frameCount = 0;
let lastFpsTime = performance.now();

const FONT_FAMILY = 'Courier New, Courier, monospace';
let charW, charH, fontSize;

function measureFont(size) {
  fontSize = size;
  outCtx.font = `bold ${fontSize}px ${FONT_FAMILY}`;
  charW = outCtx.measureText('M').width;
  charH = fontSize * 0.7;
}

const colsMin = 40;
const colsMax = isMobile ? 200 : 300;

// Scroll wheel to change resolution on desktop
document.addEventListener('wheel', (e) => {
  e.preventDefault();
  const step = e.deltaY > 0 ? 5 : -5;
  cols = Math.round(Math.max(colsMin, Math.min(colsMax, cols + step)));
}, { passive: false });

// Pinch to change resolution on mobile
let pinchStartDist = 0;
let pinchStartCols = cols;

function getPinchDist(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

document.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    pinchStartDist = getPinchDist(e.touches);
    pinchStartCols = cols;
  }
}, { passive: true });

document.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2) {
    e.preventDefault();
    const dist = getPinchDist(e.touches);
    const scale = dist / pinchStartDist;
    cols = Math.round(Math.max(colsMin, Math.min(colsMax, pinchStartCols / scale)));
  }
}, { passive: false });

document.addEventListener('keydown', (e) => {
  if (e.key === 'c' || e.key === 'C') {
    toggleCamera();
  }
});

let facingMode = 'user';
const cameraPrompt = document.getElementById('camera-prompt');
const cameraPromptText = document.getElementById('camera-prompt-text');
const retryBtn = document.getElementById('retry-btn');

retryBtn.addEventListener('click', () => startCamera());

async function startCamera() {
  retryBtn.style.display = 'none';
  cameraPromptText.textContent = 'accept camera perms for ascii';
  // Only show the prompt if permission hasn't been granted yet
  if (navigator.permissions && navigator.permissions.query) {
    try {
      const status = await navigator.permissions.query({ name: 'camera' });
      if (status.state !== 'granted') {
        cameraPrompt.style.display = 'flex';
      }
    } catch {
      cameraPrompt.style.display = 'flex';
    }
  } else {
    cameraPrompt.style.display = 'flex';
  }
  // Stop existing tracks
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: facingMode, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;
    await video.play();
    mirror = (facingMode === 'user');
    cameraPrompt.style.display = 'none';
    if (!running) {
      running = true;
      requestAnimationFrame(render);
    }
  } catch (err) {
    console.error('Camera access denied:', err);
    cameraPromptText.textContent = 'camera denied';
    retryBtn.style.display = 'block';
  }
}

function toggleCamera() {
  facingMode = (facingMode === 'user') ? 'environment' : 'user';
  startCamera();
}

// Double-tap to toggle camera on mobile (suppressed after pinch)
let lastTap = 0;
let wasPinching = false;

document.addEventListener('touchstart', (e) => {
  if (e.touches.length >= 2) wasPinching = true;
}, { passive: true });

document.addEventListener('touchend', (e) => {
  if (e.touches.length === 0 && wasPinching) {
    wasPinching = false;
    lastTap = 0;
    return;
  }
  if (e.touches.length > 0) return;
  const now = Date.now();
  if (now - lastTap < 300) {
    e.preventDefault();
    toggleCamera();
    lastTap = 0;
  } else {
    lastTap = now;
  }
});

const screenshotBtn = document.getElementById('screenshot-btn');
const lockTrack = document.getElementById('lock-track');
const lockIcon = document.getElementById('lock-icon');
const lockThumb = document.getElementById('lock-thumb');

const HOLD_TO_RECORD_MS = 380;
const LOCK_DRAG_THRESHOLD = 80; // px to drag right to lock
let holdTimer = null;
let activePointerId = null;
let didHoldToRecord = false;
let recordingLocked = false;
let pointerStartX = 0;
let recorder = null;
let recorderChunks = [];
let recordingStream = null;

screenshotBtn.addEventListener('pointerdown', (e) => {
  // If recording is locked, tap to stop
  if (recordingLocked) {
    stopRecording();
    exitLockedMode();
    return;
  }
  if (activePointerId !== null) return;
  activePointerId = e.pointerId;
  pointerStartX = e.clientX;
  didHoldToRecord = false;
  screenshotBtn.setPointerCapture(e.pointerId);
  holdTimer = setTimeout(() => {
    didHoldToRecord = true;
    startRecording();
    lockTrack.classList.add('visible');
  }, HOLD_TO_RECORD_MS);
});

screenshotBtn.addEventListener('pointermove', (e) => {
  if (e.pointerId !== activePointerId || !didHoldToRecord || recordingLocked) return;
  const dx = e.clientX - pointerStartX;
  const clampedDx = Math.max(0, Math.min(LOCK_DRAG_THRESHOLD, dx));
  // Move thumb without transition during drag
  lockThumb.style.transition = 'none';
  lockThumb.style.transform = `translateX(${clampedDx}px)`;
  if (clampedDx / LOCK_DRAG_THRESHOLD > 0.7) {
    lockIcon.classList.add('highlight');
  } else {
    lockIcon.classList.remove('highlight');
  }
  if (dx >= LOCK_DRAG_THRESHOLD) {
    enterLockedMode();
  }
});

screenshotBtn.addEventListener('pointerup', (e) => {
  if (e.pointerId !== activePointerId) return;
  if (recordingLocked) return;
  resetLockTrack();
  finishCaptureGesture();
});

screenshotBtn.addEventListener('pointercancel', (e) => {
  if (e.pointerId !== activePointerId) return;
  if (recordingLocked) return;
  resetLockTrack();
  resetCaptureGesture();
  if (isRecording()) stopRecording();
});

screenshotBtn.addEventListener('lostpointercapture', () => {
  if (recordingLocked) return;
  resetCaptureGesture();
});

function resetLockTrack() {
  lockIcon.classList.remove('highlight');
  lockThumb.style.transition = 'transform 0.25s ease';
  lockThumb.style.transform = 'translateX(0)';
  lockTrack.classList.remove('visible');
}

function enterLockedMode() {
  recordingLocked = true;
  activePointerId = null;
  resetLockTrack();
  screenshotBtn.classList.remove('recording');
  screenshotBtn.classList.add('recording-locked');
}

function exitLockedMode() {
  recordingLocked = false;
  screenshotBtn.classList.remove('recording-locked');
}

// Rotate camera button
const rotateBtn = document.getElementById('rotate-btn');
rotateBtn.addEventListener('click', () => toggleCamera());
rotateBtn.addEventListener('touchend', (e) => {
  e.preventDefault();
  toggleCamera();
});

function takeScreenshot() {
  const now = new Date();
  const ts = now.getFullYear() + '-'
    + String(now.getMonth() + 1).padStart(2, '0') + '-'
    + String(now.getDate()).padStart(2, '0') + '-'
    + String(now.getHours()).padStart(2, '0')
    + String(now.getMinutes()).padStart(2, '0')
    + String(now.getSeconds()).padStart(2, '0');
  const filename = `ascii-goggles-${ts}.png`;
  asciiCanvas.toBlob((blob) => {
    const file = new File([blob], filename, { type: 'image/png' });
    if (isMobile && navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      navigator.share({ files: [file] });
    } else {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
    }
  }, 'image/png');
}

function resetCaptureGesture() {
  if (holdTimer) {
    clearTimeout(holdTimer);
    holdTimer = null;
  }
  activePointerId = null;
}

function finishCaptureGesture() {
  if (holdTimer) {
    clearTimeout(holdTimer);
    holdTimer = null;
  }
  if (didHoldToRecord) {
    stopRecording();
  } else {
    takeScreenshot();
  }
  activePointerId = null;
}

function isRecording() {
  return recorder && recorder.state === 'recording';
}

function startRecording() {
  if (isRecording()) return;
  if (!window.MediaRecorder || !asciiCanvas.captureStream) {
    console.error('MediaRecorder/captureStream not supported in this browser.');
    return;
  }

  const mimeType = ['video/mp4;codecs=h264', 'video/mp4;codecs=avc1', 'video/mp4',
    'video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm']
    .find(t => MediaRecorder.isTypeSupported(t)) || 'video/webm';
  recordingStream = asciiCanvas.captureStream(30);
  recorderChunks = [];
  recorder = new MediaRecorder(recordingStream, { mimeType });
  recorder.ondataavailable = (event) => {
    if (event.data && event.data.size > 0) recorderChunks.push(event.data);
  };
  recorder.onstop = saveRecording;
  recorder.start();
  screenshotBtn.classList.add('recording');
}

function stopRecording() {
  if (!isRecording()) return;
  recorder.stop();
  screenshotBtn.classList.remove('recording');
  screenshotBtn.classList.remove('recording-locked');
  lockTrack.classList.remove('visible');
  recordingLocked = false;
}

function saveRecording() {
  const now = new Date();
  const ts = now.getFullYear() + '-'
    + String(now.getMonth() + 1).padStart(2, '0') + '-'
    + String(now.getDate()).padStart(2, '0') + '-'
    + String(now.getHours()).padStart(2, '0')
    + String(now.getMinutes()).padStart(2, '0')
    + String(now.getSeconds()).padStart(2, '0');
  const mime = recorder.mimeType || 'video/webm';
  const ext = mime.startsWith('video/mp4') ? 'mp4' : 'webm';
  const blob = new Blob(recorderChunks, { type: mime });
  const filename = `ascii-goggles-${ts}.${ext}`;
  const file = new File([blob], filename, { type: mime });
  if (isMobile && navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
    navigator.share({ files: [file] });
  } else {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  if (recordingStream) {
    recordingStream.getTracks().forEach((track) => track.stop());
    recordingStream = null;
  }
  recorder = null;
  recorderChunks = [];
}

startCamera();

function render() {
  if (!running) return;

  const vw = video.videoWidth;
  const vh = video.videoHeight;
  if (!vw || !vh) { requestAnimationFrame(render); return; }

  const screenW = window.innerWidth * devicePixelRatio;
  const screenH = window.innerHeight * devicePixelRatio;
  const videoAspect = vw / vh;

  const targetFontSize = Math.max(4, Math.floor(screenW / cols / 0.6));
  measureFont(targetFontSize);

  const cellAspect = charW / charH;

  const wA = Math.ceil(screenW / charW);
  const hA = Math.ceil(wA * cellAspect / videoAspect);
  const hB = Math.ceil(screenH / charH);
  const wB = Math.ceil(hB * videoAspect / cellAspect);

  let w, h;
  if (hA * charH >= screenH) { w = wA; h = hA; }
  else { w = wB; h = hB; }

  if (asciiCanvas.width !== screenW || asciiCanvas.height !== screenH) {
    asciiCanvas.width = screenW;
    asciiCanvas.height = screenH;
  }

  sampleCanvas.width = w;
  sampleCanvas.height = h;
  if (mirror) {
    sampleCtx.translate(w, 0);
    sampleCtx.scale(-1, 1);
  }
  sampleCtx.drawImage(video, 0, 0, w, h);
  if (mirror) sampleCtx.setTransform(1, 0, 0, 1, 0, 0);

  const imageData = sampleCtx.getImageData(0, 0, w, h);
  const data = imageData.data;
  const len = charset.length;

  outCtx.fillStyle = '#0a0a0f';
  outCtx.fillRect(0, 0, screenW, screenH);
  outCtx.font = `bold ${fontSize}px ${FONT_FAMILY}`;
  outCtx.textBaseline = 'top';

  const offsetX = (screenW - w * charW) / 2;
  const offsetY = (screenH - h * charH) / 2;

  for (let y = 0; y < h; y++) {
    const py = offsetY + y * charH;
    if (py + charH < 0 || py > screenH) continue;
    for (let x = 0; x < w; x++) {
      const px = offsetX + x * charW;
      if (px + charW < 0 || px > screenW) continue;
      const i = (y * w + x) * 4;
      const r = data[i], g = data[i + 1], b = data[i + 2];
      const brightness = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      const charIdx = Math.floor(brightness * (len - 1));
      const ch = charset[charIdx];
      if (ch === ' ') continue;

      outCtx.fillStyle = `rgb(${r},${g},${b})`;
      outCtx.fillText(ch, px, py);
    }
  }

  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    fpsCounter.textContent = frameCount + ' fps';
    frameCount = 0;
    lastFpsTime = now;
  }

  requestAnimationFrame(render);
}
</script>

</body>
</html>
